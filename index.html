<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Will You Be My Valentine?</title> <style> * { box-sizing: border-box; } body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: linear-gradient(135deg, #ffd6e8, #ffeccf); overflow: hidden; } .card { width: min(92vw, 560px); background: #ffffff; border-radius: 18px; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.14); padding: 28px 24px 36px; text-align: center; position: relative; min-height: 260px; } h1 { margin: 0 0 10px; color: #d6336c; font-size: 2rem; } p { margin: 0 0 24px; color: #444; font-size: 1.08rem; } .buttons-wrap { position: relative; height: 110px; } button { border: none; border-radius: 999px; padding: 12px 26px; font-size: 1rem; font-weight: 700; cursor: pointer; } #yesBtn { background: #ff4d88; color: #fff; box-shadow: 0 8px 20px rgba(255, 77, 136, 0.35); } #yesBtn:hover { background: #e83e79; } #noBtn { position: absolute; left: 62%; top: 24px; background: #e9ecef; color: #333; transition: left 0.08s linear, top 0.08s linear; user-select: none; } .message { margin-top: 10px; font-size: 1.1rem; color: #c2255c; font-weight: 700; min-height: 28px; } .kiss-gif { width: min(240px, 70vw); margin-top: 10px; border-radius: 12px; display: none; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16); } .heart { position: fixed; left: 0; top: 0; pointer-events: none; z-index: 9999; animation: heartBurst ease-out forwards; text-shadow: 0 2px 8px rgba(255, 77, 136, 0.4); will-change: transform, opacity; } @keyframes heartBurst { 0% { transform: translate(0, 0) scale(0.3) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--drift-x), calc(-1 * var(--rise-y))) scale(1.35) rotate(var(--spin)); opacity: 0; } } </style> </head> <body> <main class="card"> <h1>Will you be my Valentine? ❤️</h1> <p>Choose wisel!</p> <div class="buttons-wrap" id="playArea"> <button id="yesBtn">Yes</button> <button id="noBtn" aria-label="No button">No</button> </div> <div class="message" id="resultMsg"></div> <img id="kissGif" class="kiss-gif" alt="Cute kiss gif" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" /> </main> <script> const yesBtn = document.getElementById("yesBtn"); const noBtn = document.getElementById("noBtn"); const playArea = document.getElementById("playArea"); const resultMsg = document.getElementById("resultMsg"); const kissGif = document.getElementById("kissGif"); const heartColors = ["#ff4d88", "#ff6b6b", "#f06595", "#845ef7", "#339af0", "#20c997", "#fcc419", "#ff922b"]; const kissGifSources = [ "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif", "https://media.giphy.com/media/11Un64tF2yX8JO/giphy.gif", "https://media.giphy.com/media/FqBTvSNjNzeZG/giphy.gif" ]; let gifSourceIndex = 0; kissGif.addEventListener("error", () => { gifSourceIndex += 1; if (gifSourceIndex < kissGifSources.length) { kissGif.src = kissGifSources[gifSourceIndex]; } else { // Graceful fallback when all remote GIFs are blocked. kissGif.style.display = "none"; resultMsg.textContent = "Yay! Best answer ever! 💖🥰 (GIF blocked by network)"; } }); function moveNoButton() { const areaRect = playArea.getBoundingClientRect(); const btnRect = noBtn.getBoundingClientRect(); const maxX = areaRect.width - btnRect.width; const maxY = areaRect.height - btnRect.height; const nextLeft = Math.max(0, Math.random() * maxX); const nextTop = Math.max(0, Math.random() * maxY); noBtn.style.left = `${nextLeft}px`; noBtn.style.top = `${nextTop}px`; } // Move away before the cursor can click. noBtn.addEventListener("mouseenter", moveNoButton); noBtn.addEventListener("mouseover", moveNoButton); noBtn.addEventListener("click", (event) => { event.preventDefault(); moveNoButton(); }); // Touch devices: still keep it slippery. noBtn.addEventListener("touchstart", (event) => { event.preventDefault(); moveNoButton(); }, { passive: false }); function spawnHeart(originX, originY) { const heart = document.createElement("span"); heart.className = "heart"; heart.textContent = Math.random() > 0.3 ? "❤" : "💖"; heart.style.left = `${originX}px`; heart.style.top = `${originY}px`; heart.style.fontSize = `${16 + Math.random() * 26}px`; heart.style.animationDuration = `${1.2 + Math.random() * 1.0}s`; heart.style.color = heartColors[Math.floor(Math.random() * heartColors.length)]; heart.style.setProperty("--drift-x", `${-260 + Math.random() * 520}px`); heart.style.setProperty("--rise-y", `${160 + Math.random() * 280}px`); heart.style.setProperty("--spin", `${-45 + Math.random() * 90}deg`); document.body.appendChild(heart); setTimeout(() => { heart.remove(); }, 2400); } function popHeartBurst() { const yesRect = yesBtn.getBoundingClientRect(); const originX = yesRect.left + yesRect.width / 2; const originY = yesRect.top + yesRect.height / 2; for (let i = 0; i < 48; i++) { setTimeout(() => { spawnHeart(originX, originY); }, Math.random() * 140); } } yesBtn.addEventListener("click", () => { resultMsg.textContent = "Yay! Best answer ever! 💖🥰"; gifSourceIndex = 0; kissGif.src = kissGifSources[gifSourceIndex]; kissGif.style.display = "inline-block"; popHeartBurst(); }); </script> </body> </html>
